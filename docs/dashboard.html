<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="img/logo.png" type="image/png">
</head>

<body class="dashboard-body">
    <div id="loading" class="dashboard-loading">
        <div class="spinner-border text-light" role="status"></div>
    </div>

    <div id="dashboard" class="dashboard-container" style="display: none;">
        <header class="dashboard-header">
            <h1>Dashboard</h1>
            <button id="signOut" class="btn btn-outline-light btn-sm">
                <i class="fas fa-sign-out-alt me-1"></i>Uitloggen
            </button>
        </header>

        <main class="dashboard-main">

            <!-- Habit Tracker -->
            <section class="dash-section">
                <div class="section-head">
                    <h2><i class="fas fa-check-circle me-2"></i>Habits</h2>
                    <div class="week-nav">
                        <button id="prevWeek" class="btn-icon"><i class="fas fa-chevron-left"></i></button>
                        <span id="weekLabel"></span>
                        <button id="nextWeek" class="btn-icon"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="habit-grid" id="habitGrid"></div>

                <div class="habit-actions">
                    <button id="addHabit" class="btn-ghost"><i class="fas fa-plus me-1"></i>Habit toevoegen</button>
                </div>

                <!-- Streaks -->
                <div class="streaks-row" id="streaksRow"></div>

                <!-- Heatmap -->
                <div class="heatmap-wrapper">
                    <h3>Laatste 3 maanden</h3>
                    <div class="heatmap" id="heatmap"></div>
                    <div class="heatmap-legend">
                        <span>Minder</span>
                        <div class="heatmap-cell" style="background: var(--heat-0)"></div>
                        <div class="heatmap-cell" style="background: var(--heat-1)"></div>
                        <div class="heatmap-cell" style="background: var(--heat-2)"></div>
                        <div class="heatmap-cell" style="background: var(--heat-3)"></div>
                        <div class="heatmap-cell" style="background: var(--heat-4)"></div>
                        <span>Meer</span>
                    </div>
                </div>
            </section>

            <!-- Weight Tracker -->
            <section class="dash-section">
                <div class="section-head">
                    <h2><i class="fas fa-weight-scale me-2"></i>Gewicht</h2>
                </div>

                <div class="weight-input-row">
                    <input type="number" id="weightInput" class="weight-input" placeholder="kg" step="0.1" min="30" max="300">
                    <button id="saveWeight" class="btn-accent">Opslaan</button>
                </div>

                <div class="weight-stats" id="weightStats"></div>

                <div class="chart-container">
                    <canvas id="weightChart"></canvas>
                </div>
            </section>

            <!-- YouTube Section -->
            <section class="dash-section">
                <div class="section-head">
                    <h2><i class="fab fa-youtube me-2" style="color:#ff4444"></i>YouTube</h2>
                    <button id="refreshYT" class="btn-icon" title="Vernieuwen"><i class="fas fa-rotate-right"></i></button>
                </div>

                <!-- Channel Stats -->
                <div class="yt-stats-bar" id="ytStats">
                    <span class="text-dim" style="font-size:0.8rem">Laden...</span>
                </div>

                <!-- Latest Videos -->
                <div class="yt-subsection">
                    <h3 class="yt-sub-title">Laatste video's</h3>
                    <div id="ytVideos"></div>
                </div>

                <!-- Toolkit Links -->
                <div class="yt-subsection">
                    <h3 class="yt-sub-title">Toolkit</h3>
                    <div class="yt-links-grid">
                        <a href="https://yt1s.io" target="_blank" class="yt-link-card"><i class="fab fa-youtube"></i><span>YT Downloader</span></a>
                        <a href="https://snapinsta.app" target="_blank" class="yt-link-card"><i class="fab fa-instagram"></i><span>Insta Downloader</span></a>
                        <a href="https://elevenlabs.io" target="_blank" class="yt-link-card"><i class="fas fa-microphone"></i><span>ElevenLabs</span></a>
                        <a href="https://studio.youtube.com" target="_blank" class="yt-link-card"><i class="fas fa-chart-bar"></i><span>YT Studio</span></a>
                    </div>
                </div>

                <!-- Kanban Ideas -->
                <div class="yt-subsection">
                    <div class="yt-sub-head">
                        <h3 class="yt-sub-title">Channel Ideas</h3>
                        <button id="addIdea" class="btn-ghost" style="font-size:0.78rem;padding:0.3rem 0.8rem"><i class="fas fa-plus me-1"></i>Idee</button>
                    </div>
                    <div class="kanban-board">
                        <div class="kanban-col">
                            <div class="kanban-col-header kanban-idee">Idee</div>
                            <div class="kanban-cards" id="kanban-idee"></div>
                        </div>
                        <div class="kanban-col">
                            <div class="kanban-col-header kanban-opname">Opname</div>
                            <div class="kanban-cards" id="kanban-opname"></div>
                        </div>
                        <div class="kanban-col">
                            <div class="kanban-col-header kanban-gepubliceerd">Gepubliceerd</div>
                            <div class="kanban-cards" id="kanban-gepubliceerd"></div>
                        </div>
                    </div>
                </div>

                <!-- Video Sources -->
                <div class="yt-subsection">
                    <div class="yt-sub-head">
                        <h3 class="yt-sub-title">Video Sources</h3>
                        <button id="addSource" class="btn-ghost" style="font-size:0.78rem;padding:0.3rem 0.8rem"><i class="fas fa-plus me-1"></i>Toevoegen</button>
                    </div>
                    <div id="sourcesList"></div>
                </div>
            </section>

        </main>
    </div>

    <!-- Add Habit Modal -->
    <div class="modal fade" id="addHabitModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content dash-modal">
                <div class="modal-body p-4">
                    <h5 class="mb-3">Nieuwe habit</h5>
                    <input type="text" id="habitNameInput" class="form-control dash-input mb-3" placeholder="Naam">
                    <select id="habitTypeInput" class="form-select dash-input mb-3">
                        <option value="daily">Dagelijks</option>
                        <option value="weekly">Wekelijks (x per week)</option>
                    </select>
                    <div id="targetRow" class="mb-3" style="display:none;">
                        <div class="d-flex align-items-center gap-2">
                            <input type="number" id="habitTargetInput" class="form-control dash-input" placeholder="3" min="1" max="7" value="3" style="width:70px;">
                            <span class="text-dim">x per week min.</span>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button id="confirmAddHabit" class="btn-accent flex-grow-1">Toevoegen</button>
                        <button class="btn-ghost" data-bs-dismiss="modal">Annuleer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Idea Modal -->
    <div class="modal fade" id="addIdeaModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content dash-modal">
                <div class="modal-body p-4">
                    <h5 class="mb-3">Nieuw idee</h5>
                    <input type="text" id="ideaTitleInput" class="form-control dash-input mb-3" placeholder="Video titel of idee">
                    <div class="d-flex gap-2">
                        <button id="confirmAddIdea" class="btn-accent flex-grow-1">Toevoegen</button>
                        <button class="btn-ghost" data-bs-dismiss="modal">Annuleer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Source Modal -->
    <div class="modal fade" id="addSourceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content dash-modal">
                <div class="modal-body p-4">
                    <h5 class="mb-3">Nieuwe video source</h5>
                    <input type="text" id="sourceTextInput" class="form-control dash-input mb-3" placeholder="URL, account, idee...">
                    <div class="d-flex gap-2">
                        <button id="confirmAddSource" class="btn-accent flex-grow-1">Toevoegen</button>
                        <button class="btn-ghost" data-bs-dismiss="modal">Annuleer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
